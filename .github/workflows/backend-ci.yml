name: CI

on:
  push:
    branches:
      - master
      - dev
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - "monitoring/**"
      - ".env.example"
      - "init.sh"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - master
      - dev
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - "monitoring/**"
      - ".env.example"
      - "init.sh"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: educational_practice_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d educational_practice_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/educational_practice_test
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: educational_practice_test
      ELASTICSEARCH_URL: http://127.0.0.1:9200
      REDIS_URL: redis://127.0.0.1:6379/0

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: python -m ruff check app tests

      - name: Run tests
        run: python -m pytest tests --ignore=tests/test_document_validation_with_reports.py

      - name: Build backend image
        run: docker build -t educational-practice-backend .

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Build frontend image
        run: docker build --build-arg VITE_API_URL=http://localhost:8000 -t educational-practice-frontend .

  compose-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker compose configuration
        run: docker compose config
